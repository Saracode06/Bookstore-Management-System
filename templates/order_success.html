<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Placed – Book Zone</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e6fa5 0%, #0c5381 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 55px 45px;
            width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            text-align: center;
        }

        .success-icon {
            font-size: 64px;
            margin-bottom: 16px;
            animation: pop 0.5s ease;
        }

        @keyframes pop {
            0%   { transform: scale(0.5); opacity: 0; }
            80%  { transform: scale(1.1); }
            100% { transform: scale(1);   opacity: 1; }
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            color: #1e6fa5;
            margin-bottom: 10px;
        }

        .order-id-box {
            background: #f0f8ff;
            border: 1.5px dashed #378dc7;
            border-radius: 10px;
            padding: 14px 20px;
            margin: 22px 0;
            font-size: 14px;
            color: #555;
        }

        .order-id-box strong {
            display: block;
            font-size: 22px;
            color: #1e6fa5;
            font-weight: 700;
            margin-top: 4px;
        }

        p {
            font-size: 14px;
            color: #888;
            margin-bottom: 28px;
        }

        .btn {
            display: inline-block;
            padding: 13px 32px;
            background: linear-gradient(135deg, #378dc7, #1e6fa5);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            transition: 0.25s;
        }

        .btn:hover {
            background: linear-gradient(135deg, #2f78a9, #17568a);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(30,111,165,0.3);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="success-icon">🎉</div>
        <h1>Order Placed Successfully!</h1>
        <p>Thank you for shopping with BookZone. Your order is confirmed!</p>

        <div class="order-id-box">
            Your Order ID
            <strong>#{{ order_id }}</strong>
        </div>

        <a href="/home" class="btn">Continue Shopping →</a>
    </div>
</body>
</html>
