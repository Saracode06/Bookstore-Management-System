<!DOCTYPE html>
<html>
<head>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<title>Your Cart</title>

</head>

<body>

<h1>Your Shopping Cart</h1>

{% if items|length == 0 %}

<h2>Your cart is empty</h2>

{% else %}

{% for item in items %}

<div class="cart-item">

<img src="{{ url_for('static', filename=item[3]) }}" width="120">

<div class="cart-info">

<h3>{{ item[1] }}</h3>

<p>Price: ₹{{ item[2] }}</p>

<div class="qty">

<a href="/decrease/{{ item[0] }}"> - </a>

<span>{{ item[4] }}</span>

<a href="/increase/{{ item[0] }}"> + </a>

</div>

<p><strong>Total: ₹{{ item[2] * item[4] }}</strong></p>

<a class="remove-btn" href="/remove/{{ item[0] }}">Remove</a>

</div>

</div>

<hr>

{% endfor %}

<div class="cart-total">

<h2>Subtotal: ₹{{ total }}</h2>
<a href="/checkout">
<button class="checkout-btn">Proceed to Checkout</button>
</a>
</div>

{% endif %}
<button onclick="history.back()">Go Back</button>
</body>
</html>
